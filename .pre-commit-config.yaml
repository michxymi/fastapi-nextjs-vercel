# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.5
  hooks:
    # Run the linter.
    - id: ruff-check
    # Run the formatter.
    - id: ruff-format
# Ty doesn't have yet an official pre-commit hook, see https://github.com/astral-sh/ty/issues/269
- repo: local
  hooks:
    - id: ty
      name: ty check
      entry: uv run --project api ty check
      language: system
      files: ^api/.*\.py$
- repo: local
  hooks:
    - id: ultracite
      name: ultracite
      entry: pnpm exec ultracite fix
      language: system
      types_or: [javascript, jsx, ts, tsx, json, css]
      pass_filenames: false
